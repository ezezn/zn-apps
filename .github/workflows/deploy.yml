name: Desplegar Multi-PWA Monorepo a GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-deprecation'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Descargar el código del repositorio
      - uses: actions/checkout@v4
      
      # Paso 2: Configurar el entorno de Node 24
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Ya funciona seguro gracias a la regeneración del lockfile
          
      # Paso 3: ¡PRIMERO SE INSTALAN LAS DEPENDENCIAS! (Esto crea node_modules)
      - name: Instalar Dependencias del Monorrepo
        run: npm install
        
      # Paso 4: ¡AHORA SÍ SE HACE EL BUILD! (Vite ya existe en el servidor)
      - name: Ejecutar Compilación Unificada
        run: npm run build:all
           
      # Paso 5: Copiar los enrutamientos de error 404
      - name: Inyectar Enrutamientos Fallback 404
        run: |
          cp dist/pwa-app1/index.html dist/pwa-app1/404.html
          cp dist/pwa-app2/index.html dist/pwa-app2/404.html
          cp dist/index.html dist/404.html
             
      # Paso 6: Subir y publicar en GitHub Pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - uses: actions/deploy-pages@v4
